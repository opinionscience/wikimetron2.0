services:
  wikimetron-api:
    build:
      context: ./backend
    ports:
      - "8200:8000"
    env_file:
      - .env
    depends_on:
      - postgres
      - redis

  wikimetron-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    ports:
      - "8300:80"
    depends_on:
      - wikimetron-api

  postgres:
    image: postgres:15-alpine
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD}"]
    env_file:
      - .env

volumes:
  postgres_data:
  redis_data: